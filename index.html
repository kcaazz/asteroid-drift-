<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Asteroid Drift</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#06070d;
    font-family:'Courier New',monospace; -webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none;}
  canvas{display:block;touch-action:none;}
  #dev{position:fixed;top:4px;left:4px;color:#37ff7a;font:12px monospace;
    display:none;z-index:50;background:rgba(0,0,0,.4);padding:2px 6px;border-radius:4px;}
  #settingsBtn{
    position:fixed;top:10px;right:10px;z-index:40;
    background:rgba(20,22,40,.7);border:2px solid #5a5f8c;color:#dfe3ff;
    font:13px 'Courier New',monospace;padding:6px 10px;border-radius:6px;
    cursor:pointer;letter-spacing:1px;
  }
  #settingsBtn:active{background:rgba(60,65,110,.9);}
  #overlay{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(4,5,12,.78);z-index:60;
  }
  #panel{
    background:#12142a;border:2px solid #5a5f8c;border-radius:10px;
    padding:20px 24px;color:#dfe3ff;min-width:280px;max-width:90vw;
    box-shadow:0 0 30px rgba(60,80,255,.25);
  }
  #panel h2{margin:0 0 12px;font-size:18px;letter-spacing:2px;color:#9be8ff;}
  .row{display:flex;align-items:center;justify-content:space-between;
    gap:12px;margin:10px 0;font-size:14px;}
  .row .hint{display:block;font-size:11px;color:#8b90c0;margin-top:2px;max-width:220px;}
  .toggle{
    width:46px;height:24px;border-radius:12px;background:#2a2d4f;
    border:2px solid #5a5f8c;position:relative;cursor:pointer;flex:none;
  }
  .toggle.on{background:#1f6b4a;border-color:#37ff7a;}
  .toggle .knob{
    position:absolute;top:1px;left:1px;width:18px;height:18px;border-radius:50%;
    background:#dfe3ff;transition:left .12s ease;
  }
  .toggle.on .knob{left:23px;background:#37ff7a;}
  select{
    background:#1c1e3a;color:#dfe3ff;border:2px solid #5a5f8c;border-radius:6px;
    font:13px 'Courier New',monospace;padding:4px 8px;
  }
  #closeBtn{
    margin-top:14px;width:100%;background:#2a2d4f;border:2px solid #5a5f8c;
    color:#dfe3ff;font:13px 'Courier New',monospace;padding:8px;border-radius:6px;
    cursor:pointer;letter-spacing:1px;
  }
  #closeBtn:active{background:#3c4170;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dev"></div>
<button id="settingsBtn"></button>

<!-- cutscene overlay -->
<div id="cutsceneOverlay" style="display:none;position:fixed;inset:0;background:#000;z-index:100;align-items:center;justify-content:center;flex-direction:column;">
  <video id="cutsceneVideo" style="max-width:100%;max-height:100%;width:auto;height:auto;aspect-ratio:4/3;object-fit:contain;" playsinline></video>
  <div id="cutsceneSkip" style="position:absolute;bottom:24px;right:24px;color:rgba(255,255,255,0.55);font:12px 'Courier New',monospace;letter-spacing:1px;">ESC para pular</div>
</div>
<div id="errbox" style="display:none;position:fixed;top:0;left:0;right:0;background:#ff3333;color:#fff;font:14px monospace;padding:12px;z-index:9999;white-space:pre-wrap;word-break:break-all;"></div>
<script>
window.onerror = function(msg, src, line, col, err) {
  var b = document.getElementById('errbox');
  b.style.display = 'block';
  b.textContent = 'JS ERROR:\n' + msg + '\n' + (src||'') + ':' + line + ':' + col;
};
window.addEventListener('unhandledrejection', function(e) {
  var b = document.getElementById('errbox');
  b.style.display = 'block';
  b.textContent = 'PROMISE ERROR:\n' + (e.reason?.stack || e.reason);
});
</script>

<div id="overlay">
  <div id="panel">
    <h2 id="settingsTitle"></h2>
    <div class="row">
      <div><span id="vecLabel"></span><span class="hint" id="vecHint"></span></div>
      <div class="toggle" id="vecToggle"><div class="knob"></div></div>
    </div>
    <div class="row">
      <div><span id="soundLabel"></span></div>
      <div class="toggle on" id="soundToggle"><div class="knob"></div></div>
    </div>
    <div class="row">
      <div><span id="diffLabel"></span></div>
      <select id="diffSelect">
        <option value="easy"></option>
        <option value="normal" selected></option>
        <option value="hard"></option>
      </select>
    </div>
    <button id="closeBtn"></button>
  </div>
</div>

<script type="module">
import { STR } from "./strings.js";

/* ============ DOM / strings wiring ============ */
document.title = STR.title;
settingsBtn.textContent = STR.settingsButton;
settingsTitle.textContent = STR.settingsTitle;
vecLabel.textContent = STR.vectorToggleLabel;
vecHint.textContent = STR.vectorToggleHint;
soundLabel.textContent = STR.soundToggleLabel;
diffLabel.textContent = STR.difficultyLabel;
diffSelect.children[0].textContent = STR.difficultyEasy;
diffSelect.children[1].textContent = STR.difficultyNormal;
diffSelect.children[2].textContent = STR.difficultyHard;
closeBtn.textContent = STR.settingsClose;

/* ============ cutscene ============ */
const CUTSCENE_CDN = "https://d8j0ntlcm91z4.cloudfront.net/user_30mbd1KlukvGYK2XlU8xA7xE6Aq/hf_20260614_213740_29a4eb11-333e-4db3-8c38-3b41c053325f.mp4";
const cutsceneEl = document.getElementById("cutsceneOverlay");
const cutsceneVideo = document.getElementById("cutsceneVideo");

// Try local file first, fall back to CDN
cutsceneVideo.src = "./cutscene.mp4";
cutsceneVideo.addEventListener("error", () => { cutsceneVideo.src = CUTSCENE_CDN; }, { once: true });

function playCutscene(onEnd) {
  cutsceneEl.style.display = "flex";
  cutsceneVideo.currentTime = 0.2;
  cutsceneVideo.play().catch(() => onEnd()); // if blocked, skip straight to game
  cutsceneVideo.onended = () => { hideCutscene(); onEnd(); };
}
function hideCutscene() {
  cutsceneEl.style.display = "none";
  cutsceneVideo.pause();
}
document.getElementById("cutsceneSkip").addEventListener("click", () => {
  hideCutscene(); startOrRestart();
});

/* ============ persistent settings (in-memory only) ============ */
const settings = { showVectors: false, sound: true, difficulty: "normal" };

let paused = false, settingsOpen = false;

function openSettings(){
  settingsOpen = true; paused = true;
  overlay.style.display = "flex";
}
function closeSettings(){
  settingsOpen = false; paused = false;
  overlay.style.display = "none";
}
settingsBtn.addEventListener("click", () => settingsOpen ? closeSettings() : openSettings());
closeBtn.addEventListener("click", closeSettings);
overlay.addEventListener("click", (e) => { if (e.target === overlay) closeSettings(); });

vecToggle.addEventListener("click", () => {
  settings.showVectors = !settings.showVectors;
  vecToggle.classList.toggle("on", settings.showVectors);
});
soundToggle.addEventListener("click", () => {
  settings.sound = !settings.sound;
  soundToggle.classList.toggle("on", settings.sound);
});
diffSelect.addEventListener("change", () => { settings.difficulty = diffSelect.value; });

/* ============ input: command objects via physical key codes ============ */
const BIND = {
  KeyW:"up", KeyS:"down", KeyA:"left", KeyD:"right",
  ArrowUp:"up", ArrowDown:"down", ArrowLeft:"left", ArrowRight:"right",
  Space:"fire", KeyP:"pause", Escape:"escape", KeyR:"slow"
};
const PAD = { 0:"fire", 12:"up", 13:"down", 14:"left", 15:"right", 9:"pause" };
const held = new Set();
let lastEscape = false, lastPause = false, lastFireEdge = false, lastSpaceHeld = false, lastSlow = false;
let slowMotion = false;
const SLOW_FACTOR = 0.25;

addEventListener("keydown", e => {
  const c = BIND[e.code];
  if (!c) return;
  if (c === "escape") { if (!lastEscape) toggleEscape(); lastEscape = true; e.preventDefault(); return; }
  if (c === "pause")  { if (!lastPause) togglePause(); lastPause = true; e.preventDefault(); return; }
  if (c === "slow" && gameState === "playing") { if (!lastSlow) slowMotion = !slowMotion; lastSlow = true; e.preventDefault(); return; }
  held.add(c);
  if (e.code === "Space" && !settingsOpen && gameState === "title") { playCutscene(startOrRestart); return; }
  if (e.code === "Space" && !settingsOpen && gameState === "over") startOrRestart();
  e.preventDefault();
});
addEventListener("keyup", e => {
  const c = BIND[e.code];
  if (!c) return;
  if (c === "escape") lastEscape = false;
  if (c === "pause") lastPause = false;
  if (c === "slow") lastSlow = false;
  held.delete(c);
});
function toggleEscape(){
  if (cutsceneEl.style.display !== "none") { hideCutscene(); startOrRestart(); return; }
  if (settingsOpen) { closeSettings(); return; }
  if (gameState === "playing") { paused = false; slowMotion = false; gameState = "title"; }
}
function togglePause(){
  if (gameState !== "playing") return;
  paused = !paused;
}

/* ---- touch controls: left side = virtual stick (drag), right side = fire ---- */
const touchState = { active:false, startX:0, startY:0, curX:0, curY:0, firing:false };
addEventListener("touchstart", e => {
  for (const t of e.changedTouches) {
    if (t.clientX < innerWidth * 0.62) {
      touchState.active = true;
      touchState.startX = t.clientX; touchState.startY = t.clientY;
      touchState.curX = t.clientX; touchState.curY = t.clientY;
    } else {
      touchState.firing = true;
      if (gameState === "title") { playCutscene(startOrRestart); }
      else if (gameState === "over") startOrRestart();
    }
  }
  e.preventDefault();
}, {passive:false});
addEventListener("touchmove", e => {
  for (const t of e.changedTouches) {
    if (touchState.active && t.clientX < innerWidth * 0.62) {
      touchState.curX = t.clientX; touchState.curY = t.clientY;
    }
  }
  e.preventDefault();
}, {passive:false});
addEventListener("touchend", e => {
  for (const t of e.changedTouches) {
    if (t.clientX < innerWidth * 0.62) { touchState.active = false; }
    else { touchState.firing = false; }
  }
  e.preventDefault();
}, {passive:false});

function padCommands() {
  const out = new Set();
  for (const gp of navigator.getGamepads?.() ?? []) {
    if (!gp) continue;
    gp.buttons.forEach((b, i) => { if (b.pressed && PAD[i]) {
      const c = PAD[i];
      if (c === "pause") {
        if (!lastPause) togglePause();
        lastPause = true;
      } else out.add(c);
    }});
    if (!gp.buttons.some((b,i)=>PAD[i]==="pause" && b.pressed)) lastPause = false;
    const ax = gp.axes[0] || 0, ay = gp.axes[1] || 0;
    if (ax < -0.3) out.add("left");
    if (ax > 0.3) out.add("right");
    if (ay < -0.3) out.add("up");
    if (ay > 0.3) out.add("down");
    if (gp.buttons[0]?.pressed && (gameState === "title" || gameState === "over") && !lastFireEdge) {
      startOrRestart();
    }
    lastFireEdge = !!gp.buttons[0]?.pressed;
  }
  return out;
}

function commands() {
  const out = new Set([...held, ...padCommands()]);
  if (touchState.active) {
    const dx = touchState.curX - touchState.startX;
    const dy = touchState.curY - touchState.startY;
    if (dx > 8) out.add("right");
    if (dx < -8) out.add("left");
    if (dy > 8) out.add("down");
    if (dy < -8) out.add("up");
  }
  if (touchState.firing) out.add("fire");
  return out;
}

/* ============ canvas / responsive ============ */
const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
const DPR_CAP = 1.5;
let W = innerWidth, H = innerHeight;
function resize() {
  const dpr = Math.min(devicePixelRatio || 1, DPR_CAP);
  W = innerWidth; H = innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
addEventListener("resize", resize); addEventListener("orientationchange", resize); resize();

/* ============ procedural assets (canvas) ============
   Drawn in code following the STYLE FORMULA: chunky retro pixel-art /
   16-bit arcade feel, bold dark outlines, blocky silhouettes, deep black
   starfield, ship in steel-grey/slate-purple with acid-green engine glow,
   asteroids cream-white cratered, blue laser bolts, top-down view. */

function makeShipCanvas() {
  const s = 64, c = document.createElement("canvas");
  c.width = c.height = s;
  const g = c.getContext("2d");
  g.imageSmoothingEnabled = false;
  const px = (x,y,w,h,col) => { g.fillStyle = col; g.fillRect(x,y,w,h); };
  // hull base - slate purple/grey blocky silhouette, top-down ship nose-up
  px(24,4,16,10,"#3a3d5c");      // nose
  px(20,12,24,10,"#4a4e72");     // upper hull
  px(16,20,32,16,"#5a5f8c");     // mid hull
  px(20,34,24,10,"#4a4e72");     // lower hull
  px(24,42,16,8,"#3a3d5c");      // tail
  // cockpit
  px(28,14,8,10,"#1c1e3a");
  px(29,15,6,8,"#7fd7ff");
  // wings
  px(4,24,14,18,"#2e3050");
  px(46,24,14,18,"#2e3050");
  px(6,26,10,4,"#5a5f8c");
  px(48,26,10,4,"#5a5f8c");
  // green engine accents
  px(20,46,6,6,"#37ff7a");
  px(38,46,6,6,"#37ff7a");
  px(22,48,2,2,"#bfffd9");
  px(40,48,2,2,"#bfffd9");
  // dark outline pass
  g.strokeStyle = "#10111f"; g.lineWidth = 1;
  g.strokeRect(0.5,0.5,s-1,s-1);
  return c;
}

function makeRockCanvas(big, seed) {
  const s = big ? 84 : 46, c = document.createElement("canvas");
  c.width = c.height = s;
  const g = c.getContext("2d");
  g.imageSmoothingEnabled = false;
  let r = seed >>> 0;
  const rr = () => { r ^= r<<13; r ^= r>>>17; r ^= r<<5; return ((r>>>0)/4294967296); };
  const cx = s/2, cy = s/2, base = s*0.42;
  g.fillStyle = "#e7e0cf";
  g.beginPath();
  const pts = 10;
  for (let i=0;i<=pts;i++){
    const ang = (i/pts)*Math.PI*2;
    const rad = base * (0.78 + rr()*0.28);
    const x = cx + Math.cos(ang)*rad, y = cy + Math.sin(ang)*rad;
    if (i===0) g.moveTo(x,y); else g.lineTo(x,y);
  }
  g.closePath(); g.fill();
  g.fillStyle = "#c9c0a8";
  for (let i=0;i<(big?6:3);i++){
    const cx2 = cx + (rr()-0.5)*base*1.1;
    const cy2 = cy + (rr()-0.5)*base*1.1;
    const cr = base*(0.08+rr()*0.12);
    g.beginPath(); g.arc(cx2,cy2,cr,0,Math.PI*2); g.fill();
  }
  g.strokeStyle = "#9a9078"; g.lineWidth = 1.5;
  for (let i=0;i<(big?4:2);i++){
    g.beginPath();
    g.moveTo(cx + (rr()-0.5)*base, cy + (rr()-0.5)*base);
    g.lineTo(cx + (rr()-0.5)*base, cy + (rr()-0.5)*base);
    g.stroke();
  }
  g.strokeStyle = "#5a5440"; g.lineWidth = 2;
  g.beginPath();
  for (let i=0;i<=pts;i++){
    const ang = (i/pts)*Math.PI*2;
    const rad = base * (0.78 + 0.28*Math.abs(Math.sin(seed+i)));
    const x = cx + Math.cos(ang)*rad, y = cy + Math.sin(ang)*rad;
    if (i===0) g.moveTo(x,y); else g.lineTo(x,y);
  }
  g.closePath(); g.stroke();
  return c;
}

function makeBgCanvas() {
  const w = 1280, h = 720, c = document.createElement("canvas");
  c.width = w; c.height = h;
  const g = c.getContext("2d");
  const grad = g.createLinearGradient(0,0,0,h);
  grad.addColorStop(0, "#05060f");
  grad.addColorStop(1, "#0a0c1c");
  g.fillStyle = grad; g.fillRect(0,0,w,h);
  let r = 0xBEEF1234;
  const rr = () => { r ^= r<<13; r ^= r>>>17; r ^= r<<5; return ((r>>>0)/4294967296); };
  for (let i=0;i<220;i++){
    const x = rr()*w, y = rr()*h, sz = rr()<0.85 ? 1 : 2;
    g.fillStyle = rr()<0.15 ? "#9be8ff" : "#dfe3ff";
    g.globalAlpha = 0.3 + rr()*0.7;
    g.fillRect(x,y,sz,sz);
  }
  g.globalAlpha = 1;
  for (let i=0;i<10;i++){
    const x = rr()*w, y = rr()*h;
    const grad2 = g.createRadialGradient(x,y,0,x,y,6);
    grad2.addColorStop(0,"rgba(255,255,255,0.8)");
    grad2.addColorStop(1,"rgba(255,255,255,0)");
    g.fillStyle = grad2;
    g.fillRect(x-6,y-6,12,12);
  }
  return c;
}

const img = {
  ship: null, // loaded from ship.png
  rockLarge: makeRockCanvas(true, 12345),
  rockSmall: makeRockCanvas(false, 67890),
  bg: makeBgCanvas(),
};
// Load ship sprite from file; fall back to procedural if missing
const _shipFallback = makeShipCanvas();
function removeBlackBg(srcImg, threshold=30) {
  const c = document.createElement("canvas");
  c.width = srcImg.naturalWidth; c.height = srcImg.naturalHeight;
  const g = c.getContext("2d");
  g.drawImage(srcImg, 0, 0);
  const d = g.getImageData(0, 0, c.width, c.height);
  for (let i = 0; i < d.data.length; i += 4) {
    const r = d.data[i], gr = d.data[i+1], b = d.data[i+2];
    if (r < threshold && gr < threshold && b < threshold) d.data[i+3] = 0;
  }
  g.putImageData(d, 0, 0);
  return c;
}
const _shipImg = new Image();
_shipImg.onload = () => { img.ship = removeBlackBg(_shipImg); };
_shipImg.onerror = () => { img.ship = _shipFallback; };
_shipImg.src = "./ship.png";

// Thruster — particle system (same approach as explosion particles)
let thrusterParts = [];
const rockVariants = { large: [], small: [] };
for (let i=0;i<3;i++) rockVariants.large.push(makeRockCanvas(true, 1000+i*777));
for (let i=0;i<3;i++) rockVariants.small.push(makeRockCanvas(false, 2000+i*555));

/* ============ seeded RNG (determinism) ============ */
let rngState = 0xC0FFEE ^ Date.now();
function rnd() {
  rngState ^= rngState << 13; rngState ^= rngState >>> 17; rngState ^= rngState << 5;
  return ((rngState >>> 0) / 4294967296);
}

/* ============ game state ============ */
const STEP = 1000 / 60;
let gameState = "title"; // title | playing | over
let score = 0, lives = 3, highScore = 0;
let ship = { x:0, y:0, w:128, h:128, vx:0, vy:0, speed:320, cooldown:0, invuln:0 };
let bullets = [], rocks = [], particles = [], spawnTimer = 0, t = 0;
let flashTimer = 0;

function diffParams() {
  switch (settings.difficulty) {
    case "easy":   return { spawnEvery: 1.15, speedMul: 0.78, rockHp: { large: 3, small: 1 } };
    case "hard":   return { spawnEvery: 0.55, speedMul: 1.35, rockHp: { large: 4, small: 1 } };
    default:       return { spawnEvery: 0.85, speedMul: 1.0,  rockHp: { large: 3, small: 1 } };
  }
}

function startOrRestart() {
  score = 0; lives = 3; t = 0; spawnTimer = 0; flashTimer = 0;
  bullets = []; rocks = []; particles = []; thrusterParts = [];
  ship = { x: W/2, y: H - 110, w: 128, h: 128, vx: 0, vy: 0, speed: 320, cooldown: 0, invuln: 0 };
  gameState = "playing"; paused = false;
}

/* ============ entity helpers ============ */
function spawnRock() {
  const dp = diffParams();
  const big = rnd() < 0.55;
  const w = big ? 84 : 46;
  // Spawn across the horizontal span (top edge), with horizontal drift component
  // representing "use of horizontal space" — rocks travel diagonally L<->R.
  const fromLeft = rnd() < 0.5;
  const x = fromLeft ? -w/2 + rnd()*W*0.4 : W - rnd()*W*0.4 + w/2;
  const y = -w/2 - rnd()*80;
  const baseSpeed = (big ? 70 : 110) * dp.speedMul;
  // Horizontal velocity biased toward the opposite side of spawn (crosses the screen),
  // vertical velocity always downward.
  const dirX = fromLeft ? (0.3 + rnd()*0.9) : -(0.3 + rnd()*0.9);
  const dirY = 0.5 + rnd()*0.7;
  const mag = Math.hypot(dirX, dirY);
  const vx = (dirX/mag) * baseSpeed;
  const vy = (dirY/mag) * baseSpeed;
  const variants = big ? rockVariants.large : rockVariants.small;
  rocks.push({
    x, y, w, h:w, vx, vy,
    spawnX: x, spawnY: y,
    rot: rnd()*Math.PI*2, rotSpeed: (rnd()-0.5)*1.2,
    hp: big ? dp.rockHp.large : dp.rockHp.small, big,
    img: variants[Math.floor(rnd()*variants.length)],
  });
}

function spawnParticles(x, y, color, n) {
  for (let i=0;i<n;i++) {
    const a = rnd()*Math.PI*2, sp = 40 + rnd()*160;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: 0.4+rnd()*0.4, color });
  }
}

function rectsOverlap(a,b){
  return Math.abs(a.x-b.x) < (a.w+b.w)/2*0.8 && Math.abs(a.y-b.y) < (a.h+b.h)/2*0.8;
}

/* ============ update ============ */
function update(dtMs, cmds) {
  if (gameState !== "playing" || paused) return;
  const dt = dtMs/1000;
  t += dt;
  flashTimer = Math.max(0, flashTimer - dt);

  // ship movement (full 2D within bottom band, but emphasis on horizontal)
  let ax = 0, ay = 0;
  if (cmds.has("left")) ax -= 1;
  if (cmds.has("right")) ax += 1;
  if (cmds.has("up")) ay -= 1;
  if (cmds.has("down")) ay += 1;
  const mag = Math.hypot(ax,ay) || 1;
  ship.x += (ax/mag) * ship.speed * dt;
  ship.y += (ay/mag) * ship.speed * dt * 0.7;
  ship.x = Math.max(ship.w/2, Math.min(W - ship.w/2, ship.x));
  ship.y = Math.max(H*0.45, Math.min(H - ship.h/2 - 8, ship.y));
  ship.invuln = Math.max(0, ship.invuln - dt);

  // firing
  ship.cooldown -= dt;
  if (cmds.has("fire") && ship.cooldown <= 0) {
    bullets.push({ x: ship.x - 12, y: ship.y - ship.h*0.35, w: 6, h: 22, vy: -620 });
    bullets.push({ x: ship.x + 12, y: ship.y - ship.h*0.35, w: 6, h: 22, vy: -620 });
    ship.cooldown = 0.16;
  }

  // bullets
  for (const b of bullets) b.y += b.vy * dt;
  bullets = bullets.filter(b => b.y > -40);

  // spawn rocks
  const dp = diffParams();
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnRock();
    spawnTimer = dp.spawnEvery * (0.7 + rnd()*0.6);
  }

  // rocks movement
  for (const r of rocks) {
    r.x += r.vx * dt; r.y += r.vy * dt; r.rot += r.rotSpeed * dt;
  }
  rocks = rocks.filter(r => r.y < H + r.h && r.x > -r.w*1.5 && r.x < W + r.w*1.5);

  // collisions: bullets vs rocks
  for (const r of rocks) {
    for (const b of bullets) {
      if (b._dead) continue;
      if (Math.abs(b.x - r.x) < r.w*0.4 && Math.abs(b.y - r.y) < r.h*0.4) {
        b._dead = true; r.hp -= 1;
        spawnParticles(b.x, b.y, "#7fd7ff", 4);
        if (r.hp <= 0) {
          r._dead = true;
          score += r.big ? 20 : 10;
          spawnParticles(r.x, r.y, r.big ? "#ffd9a0" : "#fff4cf", r.big ? 18 : 10);
          if (r.big) {
            // split into two small fragments drifting further across horizontal space
            for (let i=0;i<2;i++) {
              const dir = i===0 ? -1 : 1;
              rocks.push({
                x: r.x, y: r.y, w:46, h:46,
                vx: r.vx*0.6 + dir*60, vy: Math.abs(r.vy)*0.8,
                spawnX: r.x, spawnY: r.y, isFragment: true,
                rot: rnd()*Math.PI*2, rotSpeed: (rnd()-0.5)*1.6,
                hp: dp.rockHp.small, big:false, img: rockVariants.small[Math.floor(rnd()*rockVariants.small.length)],
              });
            }
          }
        }
      }
    }
  }
  bullets = bullets.filter(b => !b._dead);
  rocks = rocks.filter(r => !r._dead);

  // collisions: ship vs rocks
  if (ship.invuln <= 0) {
    for (const r of rocks) {
      if (rectsOverlap(ship, r)) {
        r._dead = true;
        lives -= 1;
        ship.invuln = 1.4;
        flashTimer = 0.3;
        spawnParticles(ship.x, ship.y, "#ff6b6b", 22);
        if (lives <= 0) {
          gameState = "over";
          highScore = Math.max(highScore, score);
        }
        break;
      }
    }
    rocks = rocks.filter(r => !r._dead);
  }

  // particles
  for (const p of particles) { p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt; p.vx *= 0.94; p.vy *= 0.94; }
  particles = particles.filter(p => p.life > 0);

  // thruster particles — spawn near nozzle, drift downward + slight spread
  const nozzleX = ship.x, nozzleY = ship.y + ship.h * 0.3;
  for (let i = 0; i < 5; i++) {
    const side = (rnd() - 0.5) * ship.w * 0.22;
    const speed = 90 + rnd() * 160;
    const life = 0.12 + rnd() * 0.22;
    thrusterParts.push({
      x: nozzleX + side, y: nozzleY,
      vx: side * 0.9 + (rnd()-0.5) * 18,
      vy: speed,
      life, maxLife: life,
      size: 2 + Math.round(rnd() * 3),
    });
  }
  for (const p of thrusterParts) {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.90; p.vy *= 0.97;
    p.life -= dt;
  }
  thrusterParts = thrusterParts.filter(p => p.life > 0);
}

/* ============ render ============ */
function drawSprite(image, x, y, w, h, rot) {
  ctx.save();
  ctx.translate(x,y);
  if (rot) ctx.rotate(rot);
  ctx.drawImage(image, -w/2, -h/2, w, h);
  ctx.restore();
}

function drawVectorArrow(x, y, vx, vy, color) {
  const scale = 0.6;
  const ex = x + vx*scale, ey = y + vy*scale;
  ctx.save();
  ctx.strokeStyle = color; ctx.fillStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(ex,ey); ctx.stroke();
  const ang = Math.atan2(vy,vx);
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - 9*Math.cos(ang-0.4), ey - 9*Math.sin(ang-0.4));
  ctx.lineTo(ex - 9*Math.cos(ang+0.4), ey - 9*Math.sin(ang+0.4));
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function render() {
  // background
  ctx.drawImage(img.bg, 0, 0, W, H);
  ctx.fillStyle = "rgba(6,7,13,0.18)"; ctx.fillRect(0,0,W,H);

  // horizontal-space grid hint when vectors are on (shows the coordinate field rocks move through)
  if (settings.showVectors) {
    ctx.save();
    ctx.strokeStyle = "rgba(80,120,200,0.18)";
    ctx.lineWidth = 1;
    const cols = 8;
    for (let i=1;i<cols;i++){
      const x = (W/cols)*i;
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    }
    const rows = 6;
    for (let i=1;i<rows;i++){
      const y = (H/rows)*i;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }
    ctx.restore();
  }

  // rocks
  for (const r of rocks) {
    drawSprite(r.img, r.x, r.y, r.w, r.h, r.rot);
    if (settings.showVectors) {
      drawVectorArrow(r.x, r.y, r.vx, r.vy, "#37ff7a");
      const spd = Math.hypot(r.vx, r.vy);

      // --- compute exit point (where rock leaves the screen) ---
      let tExit = Infinity;
      if (r.vx > 0) tExit = Math.min(tExit, (W + r.w) / r.vx);
      if (r.vx < 0) tExit = Math.min(tExit, (-r.w - r.x + r.x) / (-r.vx)); // simplify below
      // recalc cleanly
      tExit = Infinity;
      const margins = [
        r.vx > 0 ? (W + r.w/2 - r.x) / r.vx : Infinity,
        r.vx < 0 ? (-r.w/2 - r.x) / r.vx : Infinity,
        r.vy > 0 ? (H + r.h/2 - r.y) / r.vy : Infinity,
        r.vy < 0 ? (-r.h/2 - r.y) / r.vy : Infinity,
      ];
      tExit = Math.min(...margins.filter(v => v > 0));
      const exitX = r.x + r.vx * tExit;
      const exitY = r.y + r.vy * tExit;

      // draw spawn marker (yellow) — skip fragments; anchor near rock when spawn is off-screen
      if (r.spawnX != null && !r.isFragment) {
        ctx.save();
        ctx.fillStyle = "#ffe94d"; ctx.strokeStyle = "#ffe94d";
        const spawnOnScreen = r.spawnX >= 0 && r.spawnX <= W && r.spawnY >= 0 && r.spawnY <= H;
        if (spawnOnScreen) {
          // spawn visible: draw circle + label at actual position
          ctx.font = "bold 10px monospace"; ctx.textAlign = "center";
          ctx.fillText(`P0 (${r.spawnX.toFixed(0)}, ${r.spawnY.toFixed(0)})`, r.spawnX, r.spawnY - 14);
          ctx.beginPath(); ctx.arc(r.spawnX, r.spawnY, 4, 0, Math.PI*2);
          ctx.lineWidth = 1.5; ctx.stroke();
        } else {
          // spawn off-screen: show label above the rock (below = busy with vx/vy)
          ctx.font = "bold 10px monospace"; ctx.textAlign = "center";
          ctx.fillText(`P0 (${r.spawnX.toFixed(0)}, ${r.spawnY.toFixed(0)})`, r.x, r.y - r.h/2 - 6);
        }
        ctx.restore();
      }

      // draw exit marker (orange) — guard against Infinity
      if (isFinite(exitX) && isFinite(exitY)) {
        ctx.save();
        ctx.fillStyle = "#ff8c00"; ctx.strokeStyle = "#ff8c00";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(exitX, exitY, 5, 0, Math.PI*2); ctx.fill();
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(r.x, r.y); ctx.lineTo(exitX, exitY); ctx.stroke();
        ctx.setLineDash([]);
        ctx.font = "bold 10px monospace"; ctx.textAlign = "center";
        ctx.fillText(`P1 (${exitX.toFixed(0)}, ${exitY.toFixed(0)})`, exitX, exitY + 16);
        ctx.restore();
      }

      // velocity + speed text (green, as before)
      ctx.save();
      ctx.font = "11px monospace"; ctx.fillStyle = "#37ff7a"; ctx.textAlign = "center";
      ctx.fillText(`vx:${r.vx.toFixed(0)} vy:${r.vy.toFixed(0)}`, r.x, r.y + r.h/2 + 14);
      ctx.fillText(`${STR.vectorLegendSpeed}:${spd.toFixed(0)}`, r.x, r.y + r.h/2 + 26);
      ctx.restore();
    }
  }

  // bullets
  ctx.fillStyle = "#7fd7ff";
  for (const b of bullets) {
    ctx.save();
    ctx.shadowColor = "#7fd7ff"; ctx.shadowBlur = 8;
    ctx.fillRect(b.x-b.w/2, b.y-b.h/2, b.w, b.h);
    ctx.restore();
  }

  // particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life/0.6);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-2, p.y-2, 4, 4);
  }
  ctx.globalAlpha = 1;

  // ship
  if (gameState === "playing" || gameState === "over") {
    // thruster particles — drawn BEFORE ship so they appear behind hull
    if (thrusterParts.length) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const p of thrusterParts) {
        const ratio = p.life / p.maxLife; // 1=fresh → 0=dead
        let r, g, b;
        if (ratio > 0.72) { r = 200; g = 230; b = 255; }      // white-blue core
        else if (ratio > 0.45) { r = 255; g = 210; b = 60; }  // yellow
        else if (ratio > 0.22) { r = 255; g = 100; b = 10; }  // orange
        else { r = 180; g = 20; b = 0; }                       // red ember
        ctx.globalAlpha = ratio * 0.88;
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      }
      ctx.restore();
    }
    if ((ship.invuln <= 0 || Math.floor(t*12)%2===0) && img.ship) {
      drawSprite(img.ship, ship.x, ship.y, ship.w, ship.h, 0);
      if (settings.showVectors) {
        // ship velocity vector for context (derived this frame, shown as facing/heading hint)
        drawVectorArrow(ship.x, ship.y, 0, -ship.speed*0.4, "#9be8ff");
      }
    }
  }

  // damage flash
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,60,60,${flashTimer/0.3*0.35})`;
    ctx.fillRect(0,0,W,H);
  }

  // HUD
  ctx.textBaseline = "top";
  ctx.font = "16px monospace";
  ctx.fillStyle = "#dfe3ff";
  ctx.fillText(`${STR.scoreLabel}: ${score}`, 12, 12);
  ctx.fillText(`${STR.livesLabel}: ${"\u25B2".repeat(Math.max(0,lives))}`, 12, 34);
  ctx.fillText(`${STR.highScoreLabel}: ${highScore}`, 12, 56);

  if (gameState === "title") {
    centerText(STR.title, H*0.36, 34, "#9be8ff");
    centerText(STR.subtitle, H*0.36+34, 14, "#8b90c0");
    centerText(STR.startPrompt, H*0.55, 16, "#dfe3ff");
    centerText(STR.controlsHint, H*0.62, 12, "#8b90c0");
  }
  if (gameState === "over") {
    ctx.fillStyle = "rgba(4,5,12,0.55)"; ctx.fillRect(0,0,W,H);
    centerText(STR.gameOverTitle, H*0.4, 30, "#ff8a8a");
    centerText(`${STR.scoreLabel}: ${score}   ${STR.highScoreLabel}: ${highScore}`, H*0.4+38, 16, "#dfe3ff");
    centerText(STR.gameOverHint, H*0.4+68, 14, "#8b90c0");
  }
  if (gameState === "playing" && paused && !settingsOpen) {
    ctx.fillStyle = "rgba(4,5,12,0.55)"; ctx.fillRect(0,0,W,H);
    centerText(STR.pausedLabel, H*0.45, 28, "#dfe3ff");
    centerText(STR.resumeHint, H*0.45+32, 14, "#8b90c0");
  }
  // slow motion indicator
  if (gameState === "playing" && slowMotion) {
    ctx.save();
    ctx.font = "bold 13px monospace";
    ctx.fillStyle = "#ffe94d";
    ctx.textAlign = "right";
    ctx.fillText("⏱ CÂMERA LENTA  [R]", W - 12, 16);
    ctx.restore();
  }

  // touch hints
  if ('ontouchstart' in window && gameState === "playing") {
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = "#9be8ff";
    ctx.beginPath(); ctx.arc(W*0.85, H*0.82, 46, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.7;
    ctx.font = "12px monospace"; ctx.textAlign = "center";
    ctx.fillText(STR.fireZone, W*0.85, H*0.82-4);
    ctx.textAlign = "left";
    ctx.globalAlpha = 0.4;
    ctx.font = "11px monospace";
    ctx.fillText(STR.touchHintMove, 14, H*0.82);
    ctx.restore();
  }
}

function centerText(str, y, size, color) {
  ctx.save();
  ctx.font = `bold ${size}px monospace`;
  ctx.fillStyle = color;
  ctx.textAlign = "center";
  ctx.fillText(str, W/2, y);
  ctx.restore();
}

/* ============ loop ============ */
const dev = new URLSearchParams(location.search).has("dev");
if (dev) document.getElementById("dev").style.display = "block";
let acc = 0, last = performance.now(), frames = 0, fpsAt = last, fps = 0;
addEventListener("blur", () => { if (gameState === "playing") paused = true; });

function frame(now) {
  requestAnimationFrame(frame);
  const rawDt = now - last; last = now;
  acc += slowMotion ? rawDt * SLOW_FACTOR : rawDt;
  const cmds = commands();
  while (acc >= STEP) { update(STEP, cmds); acc -= STEP; }
  render();
  if (dev) {
    frames++;
    if (now - fpsAt >= 500) {
      fps = Math.round(frames*1000/(now-fpsAt)); frames = 0; fpsAt = now;
      document.getElementById("dev").textContent =
        `${fps} fps | rocks:${rocks?.length||0} bullets:${bullets?.length||0} particles:${particles?.length||0}`;
    }
  }
}
requestAnimationFrame(frame);
</script>
</body>
</html>
